name: route_movies_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  flutter_easyloading: ^3.0.5
  bot_toast: ^4.1.3
  lottie: ^3.2.0
  google_sign_in: ^6.2.2
  http: ^1.3.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  injectable: ^2.5.1
  get_it: ^8.2.0
  retrofit: any
  flutter_bloc: ^9.1.1
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  cloud_firestore: ^5.4.3
  youtube_player_flutter: ^9.0.0
  json_annotation: any

dev_dependencies:
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/avatars/

  fonts:
    - family: "Inter"
      fonts:
        - asset: assets/fonts/Inter_28pt-Bold.ttf
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf
        - asset: assets/fonts/Inter_28pt-Medium.ttf
        - asset: assets/fonts/Inter_28pt-Regular.ttf